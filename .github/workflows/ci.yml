name: SSH Connect CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] # This ensures your workflow runs when you push a tag like v1.0.0
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Install Debian build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper-compat golang-go devscripts

      - name: Build & test via Makefile
        run: make all

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v') # Only runs when the trigger is a tag
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: dist/

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}